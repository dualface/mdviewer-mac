name: MDViewerMac
options:
  bundleIdPrefix: com.dualface
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
targets:
  MDViewerMac:
    type: application
    platform: macOS
    sources:
      - path: App/Sources
      - path: App/Resources/Assets.xcassets
      - path: App/Resources/Renderer
        type: folder
        buildPhase: resources
    info:
      path: App/Generated/Info.plist
      properties:
        CFBundleDisplayName: MarkdownViewer
        CFBundleName: MarkdownViewer
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.productivity
        LSMultipleInstancesProhibited: true
        LSMinimumSystemVersion: "14.0"
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - net.daringfireball.markdown
              - public.plain-text
              - public.text
            CFBundleTypeExtensions:
              - md
              - markdown
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
              public.mime-type:
                - text/markdown
    entitlements:
      path: App/Generated/MDViewerMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dualface.mdviewer.mac
        PRODUCT_NAME: MarkdownViewer
        PRODUCT_MODULE_NAME: MDViewerMac
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.5"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_NSHumanReadableCopyright: Copyright © 2026 Dualface
        GENERATE_INFOPLIST_FILE: "NO"
    scheme:
      testTargets:
        - MDViewerMacTests
  MDViewerMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: App/Tests
    dependencies:
      - target: MDViewerMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dualface.mdviewer.mac.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MarkdownViewer.app/Contents/MacOS/MarkdownViewer"
        BUNDLE_LOADER: "$(TEST_HOST)"
